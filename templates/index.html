<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Newsroom MVP</title>
</head>
<body>

<h1>Deepfake Newsroom MVP</h1>

<form id="uploadForm">
    <input type="file" id="videoFile">
    <button type="submit">Analyze</button>
</form>

<h2>Result</h2>
<pre id="result"></pre>

<script>
document.getElementById("uploadForm").addEventListener("submit", async (e) => {

    e.preventDefault();

    let fd = new FormData();

    fd.append(
        "file",
        document.getElementById("videoFile").files[0]
    );

    let r = await fetch(
        "/analyze",
        {
            method: "POST",
            body: fd
        }
    );

    let d = await r.json();

    document.getElementById("result").textContent =
        JSON.stringify(d, null, 2);

});
</script>

</body>
</html>
